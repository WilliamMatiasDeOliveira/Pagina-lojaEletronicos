<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Info Tech</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">
    <!-- css aplication -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">Consul-Tech</div>
        <nav>
            <ul>
                <li><a href="index.html" style="color: inherit; text-decoration: none;">Home</a></li>
                <li><a href="produtos.html" style="color: inherit; text-decoration: none;">Produtos</a></li>
                <li><a href="contato.html" style="color: #00f7ff; text-decoration: none;">Contatos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="tech-circle">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <div class="contact-container">
            <div class="contact-form">
                <h2>Fale Conosco</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Nome Completo</label>
                        <input type="text" id="name" name="name" placeholder="Seu nome aqui..." required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Assunto</label>
                        <input type="text" id="subject" name="subject" placeholder="Em que podemos ajudar?">
                    </div>
                    <div class="form-group">
                        <label for="message">Mensagem</label>
                        <textarea id="message" name="message" rows="5" placeholder="Sua mensagem..." required></textarea>
                    </div>
                    <button type="submit" class="btn">Enviar Mensagem</button>
                </form>
                <div style="margin-top: 30px; text-align: center; color: #b8b8d0; font-size: 0.9rem;">
                    <p>📍 Av. da Tecnologia, 1000 - São Paulo, SP</p>
                    <p>📞 (11) 99999-9999 | ✉️ contato@consultech.com</p>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
