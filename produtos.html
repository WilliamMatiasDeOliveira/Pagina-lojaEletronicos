<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Info Tech</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">
    <!-- css aplication -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="scrollable-page">

    <header>
        <div class="logo">Consul-Tech</div>
        <nav>
            <ul>
                <li><a href="index.html" style="color: inherit; text-decoration: none;">Home</a></li>
                <li><a href="produtos.html" style="color: #00f7ff; text-decoration: none;">Produtos</a></li>
                <li><a href="contato.html" style="color: inherit; text-decoration: none;">Contatos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="tech-circle">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <div class="products-container">
            <h1 style="font-family: 'Orbitron', sans-serif; text-align: center; color: #00f7ff; font-size: 2.5rem; text-shadow: 0 0 15px rgba(0, 247, 255, 0.4);">Nossa Vitrine</h1>
            <div class="products-grid">
                <div class="product-card">
                    <img src="./imgs/apple-watch.png" alt="Apple Watch Series 10">
                    <h3>Apple Watch Series 10</h3>
                    <p class="price">R$ 4.299,00</p>
                    <button class="btn">Adicionar ao Carrinho</button>
                </div>
                <div class="product-card">
                    <img src="./imgs/air-pods.png" alt="Air Pods Max">
                    <h3>Air Pods Max</h3>
                    <p class="price">R$ 6.890,00</p>
                    <button class="btn">Adicionar ao Carrinho</button>
                </div>
                <div class="product-card">
                    <img src="./imgs/vision-pro.png" alt="Vision Pro">
                    <h3>Vision Pro</h3>
                    <p class="price">R$ 34.990,00</p>
                    <button class="btn">Adicionar ao Carrinho</button>
                </div>
                <!-- Produtos Adicionais Simulados -->
                <div class="product-card">
                    <img src="./imgs/apple-watch.png" alt="Apple Watch Ultra" style="filter: hue-rotate(180deg);">
                    <h3>Apple Watch Ultra 2</h3>
                    <p class="price">R$ 9.699,00</p>
                    <button class="btn">Adicionar ao Carrinho</button>
                </div>
                <div class="product-card">
                    <img src="./imgs/air-pods.png" alt="AirPods Pro" style="transform: scale(0.8);">
                    <h3>AirPods Pro (2ª gen)</h3>
                    <p class="price">R$ 2.599,00</p>
                    <button class="btn">Adicionar ao Carrinho</button>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
